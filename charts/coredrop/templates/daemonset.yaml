apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "coredrop.fullname" . }}
  labels:
    {{- include "coredrop.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "coredrop.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coredrop.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "coredrop.serviceAccountName" . }}
      hostPID: {{ .Values.hostPID }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Install the coredrop binary to a hostPath before the daemon starts.
      # The kernel exec's the handler in the host mount namespace, so the binary
      # must live on a hostPath the handler can reach from host namespaces.
      initContainers:
        - name: install-handler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - install -m 0755 /usr/local/bin/coredrop {{ .Values.capture.hostBinDir }}/coredrop
          volumeMounts:
            - name: host-bin
              mountPath: {{ .Values.capture.hostBinDir }}
      containers:
        - name: coredrop
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: CAPTURE_HANDLER_PATH
              value: "{{ .Values.capture.hostBinDir }}/coredrop"
            - name: CAPTURE_CONFIG_PATH
              value: "{{ .Values.capture.hostRunDir }}/handler.json"
            - name: CAPTURE_CLUSTER
              value: {{ .Values.capture.cluster | quote }}
            - name: CAPTURE_BACKEND
              value: {{ .Values.capture.backend | quote }}
            {{- if .Values.capture.noRedact }}
            - name: CAPTURE_NO_REDACT
              value: "true"
            {{- end }}
            - name: CRICTL_PATH
              value: {{ .Values.cri.crictlPath | quote }}
            - name: CONTAINER_RUNTIME_ENDPOINT
              value: {{ .Values.cri.runtimeEndpoint | quote }}
            {{- if .Values.capture.objectStore.url }}
            - name: CAPTURE_STORE_URL
              value: {{ .Values.capture.objectStore.url | quote }}
            {{- if .Values.capture.objectStore.endpoint }}
            - name: AWS_ENDPOINT
              value: {{ .Values.capture.objectStore.endpoint | quote }}
            {{- end }}
            - name: AWS_REGION
              value: {{ .Values.capture.objectStore.region | quote }}
            - name: AWS_ALLOW_HTTP
              value: {{ .Values.capture.objectStore.allowHttp | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "coredrop.fullname" . }}-store
                  key: accessKeyId
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "coredrop.fullname" . }}-store
                  key: secretAccessKey
                  optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # hostPath for the daemon-written handler config and the handler binary
            # install dir (the handler reads the config path from here).
            - name: host-run
              mountPath: {{ .Values.capture.hostRunDir }}
            # CRI socket for crictl enrichment (post-drain, best-effort).
            - name: cri-socket
              mountPath: {{ .Values.cri.socketHostPath }}
              readOnly: true
      volumes:
        - name: host-bin
          hostPath:
            path: {{ .Values.capture.hostBinDir }}
            type: DirectoryOrCreate
        - name: host-run
          hostPath:
            path: {{ .Values.capture.hostRunDir }}
            type: DirectoryOrCreate
        - name: cri-socket
          hostPath:
            path: {{ .Values.cri.socketHostPath }}
            type: Socket
