apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "coredrop.fullname" . }}
  labels:
    {{- include "coredrop.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "coredrop.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coredrop.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "coredrop.serviceAccountName" . }}
      hostPID: {{ .Values.hostPID }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Install the coredrop binary to a hostPath before the daemon starts.
      # The kernel exec's the handler in the host mount namespace, so the binary
      # must live on a hostPath the handler can reach from host namespaces.
      initContainers:
        - name: install-handler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - install -m 0755 /bin/coredrop {{ .Values.corePattern.hostBinDir }}/coredrop
          volumeMounts:
            - name: host-bin
              mountPath: {{ .Values.corePattern.hostBinDir }}
      containers:
        - name: coredrop
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            # corePattern: how the kernel is wired to the handler.
            - name: CAPTURE_HANDLER_PATH
              value: "{{ .Values.corePattern.hostBinDir }}/coredrop"
            - name: CAPTURE_CONFIG_PATH
              value: "{{ .Values.corePattern.hostRunDir }}/handler.json"
            - name: CAPTURE_PIPE_LIMIT
              value: {{ .Values.corePattern.pipeLimit | quote }}
            # capture: what happens once the handler captures a crash.
            - name: CAPTURE_CLUSTER
              value: {{ .Values.capture.cluster | quote }}
            {{- if .Values.capture.noRedact }}
            - name: CAPTURE_NO_REDACT
              value: "true"
            {{- end }}
            - name: CAPTURE_MAX_CORE_BYTES
              value: {{ .Values.capture.maxCoreBytes | int64 | quote }}
            - name: CAPTURE_MAX_CORES_PER_HOUR
              value: {{ .Values.capture.maxCoresPerHour | quote }}
            - name: CAPTURE_UPLOAD_DEADLINE_SECS
              value: {{ .Values.capture.uploadDeadlineSeconds | quote }}
            {{- if .Values.capture.objectStore.url }}
            - name: CAPTURE_STORE_URL
              value: {{ .Values.capture.objectStore.url | quote }}
            {{- range $key, $value := .Values.capture.objectStore.config }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if not .Values.events.enabled }}
            - name: CAPTURE_NO_EVENTS
              value: "true"
            {{- end }}
            # cri: post-drain container identity enrichment.
            - name: CRICTL_PATH
              value: {{ .Values.cri.crictlPath | quote }}
            - name: CONTAINER_RUNTIME_ENDPOINT
              value: {{ .Values.cri.runtimeEndpoint | quote }}
          {{- if and .Values.capture.objectStore.url .Values.capture.objectStore.credentials }}
          envFrom:
            - secretRef:
                name: {{ include "coredrop.fullname" . }}-store
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # hostPath for the daemon-written handler config and the handler binary
            # install dir (the handler reads the config path from here).
            - name: host-run
              mountPath: {{ .Values.corePattern.hostRunDir }}
            # CRI socket for crictl enrichment (post-drain, best-effort).
            - name: cri-socket
              mountPath: {{ .Values.cri.socketHostPath }}
              readOnly: true
      volumes:
        - name: host-bin
          hostPath:
            path: {{ .Values.corePattern.hostBinDir }}
            type: DirectoryOrCreate
        - name: host-run
          hostPath:
            path: {{ .Values.corePattern.hostRunDir }}
            type: DirectoryOrCreate
        - name: cri-socket
          hostPath:
            path: {{ .Values.cri.socketHostPath }}
            type: Socket
