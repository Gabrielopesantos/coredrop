{{- if and .Values.capture.objectStore.url .Values.capture.objectStore.credentials }}
# Static object-store credentials, injected into the daemon via envFrom. Keys
# are the provider env vars the daemon allowlists (AWS_ACCESS_KEY_ID,
# GOOGLE_SERVICE_ACCOUNT_KEY, AZURE_STORAGE_ACCESS_KEY, ...). For cloud
# environments, prefer workload identity (annotate the ServiceAccount with
# IRSA / GKE WI / AKS WI) and leave credentials empty - the store client
# resolves the credential chain from the projected ServiceAccount token
# automatically.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coredrop.fullname" . }}-store
  labels:
    {{- include "coredrop.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.capture.objectStore.credentials }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
