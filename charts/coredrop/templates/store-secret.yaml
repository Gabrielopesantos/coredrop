{{- if and .Values.capture.objectStore.url .Values.capture.objectStore.accessKeyId }}
# Static object-store credentials. For cloud environments, prefer workload
# identity (annotate the ServiceAccount with IRSA / GKE WI / AKS WI) and
# leave accessKeyId/secretAccessKey empty - the store client resolves the
# credential chain from the projected ServiceAccount token automatically.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coredrop.fullname" . }}-store
  labels:
    {{- include "coredrop.labels" . | nindent 4 }}
type: Opaque
stringData:
  accessKeyId: {{ .Values.capture.objectStore.accessKeyId | quote }}
  secretAccessKey: {{ .Values.capture.objectStore.secretAccessKey | quote }}
{{- end }}
