# -- Override the chart name segment of resource names.
nameOverride: ""
# -- Override the full generated name of chart resources.
fullnameOverride: ""

image:
  # -- Container image repository (published on `app-v*` tags).
  repository: ghcr.io/gabrielopesantos/coredrop
  # -- Image tag; empty defaults to `.Chart.AppVersion`.
  tag: "" # defaults to .Chart.AppVersion
  # -- Image pull policy.
  pullPolicy: IfNotPresent

serviceAccount:
  # For cloud workload identity (IRSA / GKE WI / AKS WI), annotate here and
  # leave objectStore credentials empty.
  # -- Annotations on the daemon's ServiceAccount (e.g. cloud workload identity).
  annotations: {}

securityContext:
  # -- Run the daemon privileged (required to write node-global sysctls).
  privileged: true

# -- Share the host PID namespace (the kernel exec's the handler there).
hostPID: true

# How the daemon wires itself into the kernel and host: installs the handler
# binary to a hostPath, points core_pattern at it, and raises core_pipe_limit
# so the kernel holds a crash open long enough for the handler to read it.
# The kernel exec's the handler in host namespaces with a clean environment,
# so it reads the hostRunDir config file the daemon wrote, not env vars.
corePattern:
  # Node-global sysctl: max crashes concurrently held open for the handler.
  # Beyond it the kernel skips the dump entirely (handler never exec'd) rather
  # than queuing - see the chart README's "Why privileged + hostPID" section.
  # -- `core_pipe_limit` sysctl the daemon installs alongside `core_pattern`.
  pipeLimit: 128
  # -- Host path the handler binary is installed to (resolved in the host mount ns).
  hostBinDir: "/opt/coredrop/bin"
  # -- Host path for the handler config and rate-limit state.
  hostRunDir: "/run/coredrop"

# What happens to a crash once the handler captures it: where it's counted
# against, how much of it is kept, and where it's uploaded.
capture:
  # -- Cluster name - the first segment of every object key.
  cluster: "local"
  # -- Truncate stored cores at this many bytes (2 GiB default).
  maxCoreBytes: 2147483648
  # Per-container core upload rate limit; excess crashes still get a manifest,
  # core payload is skipped.
  # -- Per-container core upload budget per hour; excess crashes keep manifest + snapshot only.
  maxCoresPerHour: 3
  # -- Core upload deadline in seconds; past it the upload is abandoned. 0 disables.
  uploadDeadlineSeconds: 300
  # -- Pass `environ` through un-redacted. Leave false; cores are secret-bearing.
  noRedact: false
  # S3-compatible / GCS / Azure object store for the core + proc-snapshot + manifest.
  # Leave `url` empty to run with no upload (cores discarded, pipe still drains).
  objectStore:
    # -- Object store URL (`s3://bucket`, `gs://bucket` or `az://container`); empty disables upload.
    url: ""
    # Non-secret client options, rendered as plain env vars on the daemon.
    # The daemon forwards only the keys it recognizes (src/upload.rs
    # ALLOWED_STORE_OPTS): AWS_REGION, AWS_DEFAULT_REGION, AWS_ENDPOINT,
    # AWS_ALLOW_HTTP, AWS_VIRTUAL_HOSTED_STYLE_REQUEST, AWS_ROLE_ARN,
    # AWS_WEB_IDENTITY_TOKEN_FILE (IRSA), GOOGLE_SERVICE_ACCOUNT,
    # AZURE_STORAGE_ACCOUNT_NAME, AZURE_STORAGE_CLIENT_ID,
    # AZURE_STORAGE_TENANT_ID, AZURE_CLIENT_ID, AZURE_TENANT_ID,
    # AZURE_FEDERATED_TOKEN_FILE, AZURE_AUTHORITY_HOST (AKS workload identity).
    # GKE workload identity needs no config here - it authenticates via the
    # node's metadata server automatically.
    # -- Non-secret object-store client options, rendered as plain env vars (allowlisted).
    config: {}
    #   AWS_REGION: "us-east-1"
    #   AWS_ENDPOINT: "http://minio:9000"   # S3-compatible, e.g. in-cluster MinIO
    #   AWS_ALLOW_HTTP: "true"              # plaintext endpoint
    # Secret-bearing options; rendered into the store Secret and injected via
    # envFrom. Same allowlist: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
    # AWS_SESSION_TOKEN, GOOGLE_SERVICE_ACCOUNT_KEY, AZURE_STORAGE_ACCESS_KEY,
    # AZURE_STORAGE_CLIENT_SECRET. Leave empty for workload identity
    # (annotate serviceAccount instead).
    # -- Secret-bearing object-store options, rendered into a Secret and injected via envFrom (allowlisted).
    credentials: {}
    #   AWS_ACCESS_KEY_ID: ""
    #   AWS_SECRET_ACCESS_KEY: ""

# CRI socket for crictl enrichment (post-drain identity: namespace, pod name,
# container name, image, restart count). Mounted read-only from the host.
cri:
  # -- CRI endpoint for crictl enrichment.
  runtimeEndpoint: "unix:///run/containerd/containerd.sock"
  # -- Host path of the CRI socket, mounted so the in-pod crictl can reach it.
  socketHostPath: "/run/containerd/containerd.sock"
  # Path to crictl ON THE NODE: the kernel-exec'd handler runs in the host
  # mount namespace and shells out to the node's own crictl (k3s and most
  # kubeadm nodes install it here), not a binary from this image.
  # -- Path to the crictl binary on the node (host mount ns), for the handler's enrichment.
  crictlPath: "/usr/local/bin/crictl"

# k8s Event emission on capture: posts an event on the crashing pod
# ("core dumped, artifacts at {key}") so kubectl describe pod / kubectl get
# events surfaces it. Disabling skips the daemon's socket listener and the
# events RBAC (ClusterRole/ClusterRoleBinding) is not rendered.
events:
  # -- Post a k8s Event on the crashing pod per capture; `false` also skips the events RBAC.
  enabled: true

# -- `RUST_LOG` filter for the daemon.
logLevel: info

# -- DaemonSet resource requests/limits.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# -- Pod tolerations (defaults to tolerating everything so it runs on all nodes).
tolerations:
  - operator: Exists

# -- Pod node selector.
nodeSelector: {}

# Merged onto the DaemonSet pod template's labels. Needed for AKS workload
# identity, whose webhook only injects credentials into pods carrying
# azure.workload.identity/use: "true" - see the chart README's "Workload
# identity" section.
# -- Extra labels merged onto the daemon pod template.
podLabels: {}
