# Local overlay for the live smoke test: locally-built image + in-cluster MinIO.
# The object-store endpoint is injected by up.sh as a numeric ClusterIP (the
# kernel-exec'd handler runs in the host netns and can't use cluster DNS).
image:
  repository: docker.io/library/coredrop
  tag: dev
  pullPolicy: IfNotPresent

capture:
  cluster: "local"
  objectStore:
    url: "s3://coredrop-cores"
    config:
      # AWS_ENDPOINT: injected via `--set capture.objectStore.config.AWS_ENDPOINT=http://<clusterIP>:9000`
      AWS_REGION: "us-east-1"
      AWS_ALLOW_HTTP: "true"
    credentials:
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"

# k3s runs its OWN containerd; its CRI socket is under /run/k3s, not the
# upstream /run/containerd default. crictl enrichment needs this exact path.
cri:
  runtimeEndpoint: "unix:///run/k3s/containerd/containerd.sock"
  socketHostPath: "/run/k3s/containerd/containerd.sock"
  crictlPath: "/usr/local/bin/crictl"

logLevel: info
